title: Fiche

icon: page

status:
  draft: Draft
  unlisted: Unlisted
  listed: Published

columns:
  main:
    width: 2/3
    sections:
      content:
        type: fields
        fields:
          text:
            type: textarea
            label: Text
            size: large
          notes:
            type: textarea
            label: Notes
            size: medium
  sidebar:
    width: 1/3
    sections:
      images:
        type: files
        label: Images
        template: dossier-image
      attachments:
        type: files
        label: Attachments
        template: dossier-attachment
      meta:
        type: fields
        fields:
          contributors:
            type: structure
            label: Authors
            help: Auto-added when you edit this fiche
            columns:
              user:
                label: Name
                width: 3/4
                mobile: true
              listed:
                label: Listed
                width: 1/4
                mobile: true
            fields:
              user:
                type: users
                label: User
                disabled: true
                max: 1
              listed:
                type: toggle
                label: Listed
                default: true
                text:
                  - unlisted
                  - listed
          otherauthors:
            type: textarea
            label: Other authors
            buttons: false
            size: small
